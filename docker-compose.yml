version: '3.8'

services:
  quicknotes:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - quicknotes-data:/app/data
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_MODEL=${AI_MODEL}
      - AI_PROVIDER=${AI_PROVIDER}
    restart: unless-stopped

volumes:
  quicknotes-data:
    driver: local
